<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Gravata_LMS ログイン</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; }
body {
  font-family: "Yu Gothic", "Hiragino Sans", "Noto Sans JP", sans-serif;
  background: #eef1f6;
  color: #22252b;
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 16px;
}
.card {
  width: 100%;
  max-width: 420px;
  background: #fff;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 8px 30px rgba(20,30,60,0.10);
  border: 1px solid #e2e5ea;
  padding: 40px 36px 36px;
}
.brand { text-align: center; margin-bottom: 28px; }
.brand .mark {
  width: 46px; height: 46px; border-radius: 12px;
  background: #1F3864; color: #fff; font-weight: 700; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 14px;
}
.brand h1 { font-size: 18px; font-weight: 700; margin: 0 0 4px; color: #1F3864; }
.brand p { font-size: 12.5px; color: #767b85; margin: 0; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12.5px; color: #444; margin-bottom: 6px; font-weight: 500; }
.field input {
  width: 100%; height: 42px; border: 1px solid #d8dbe2; border-radius: 8px;
  padding: 0 12px; font-size: 14px; color: #22252b; background: #fafbfc;
  outline: none;
}
.field input:focus { border-color: #1F3864; background: #fff; }
.field select {
  width: 100%; height: 42px; border: 1px solid #d8dbe2; border-radius: 8px;
  padding: 0 12px; font-size: 14px; color: #22252b; background: #fafbfc;
  outline: none;
}
.field select:focus { border-color: #1F3864; background: #fff; }
.row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.remember { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: #555; }
.forgot { font-size: 12.5px; color: #1F3864; text-decoration: none; }
.forgot:hover { text-decoration: underline; }
.btn-primary {
  width: 100%; height: 44px; border: none; border-radius: 8px;
  background: #1F3864; color: #fff; font-size: 14.5px; font-weight: 700;
  cursor: pointer;
}
.btn-primary:hover { background: #16294d; }
.btn-primary:disabled { background: #b9c1d1; cursor: not-allowed; }
.divider { display: flex; align-items: center; gap: 10px; margin: 22px 0; color: #b3b6bd; font-size: 11px; }
.divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #e6e8ec; }
.switch-link {
  text-align: center; font-size: 13px; color: #1F3864; cursor: pointer; font-weight: 700;
  background: #f4f6fb; border: 1px solid #e2e6ee; border-radius: 8px; padding: 12px 14px;
}
.switch-link:hover { background: #eef1fa; }
.footer-links { text-align: center; margin-top: 22px; font-size: 12px; color: #9296a0; }
.footer-links a { color: #767b85; text-decoration: none; margin: 0 6px; }
.err {
  display: none;
  background: #fdeceb; border: 1px solid #f3c6c2; color: #a13d34;
  font-size: 12.5px; border-radius: 8px; padding: 10px 12px; margin-bottom: 16px;
}
.ok {
  display: none;
  background: #eaf6ee; border: 1px solid #bfe3cb; color: #1e7a4c;
  font-size: 12.5px; border-radius: 8px; padding: 10px 12px; margin-bottom: 16px;
}
.demo-note {
  text-align: center; font-size: 11.5px; color: #9296a0; margin-top: 16px;
}
#signupView { display: none; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="auth.js"></script>
</head>
<body>

<div class="card">
  <div class="brand">
    <div class="mark">LMS</div>
    <h1 id="titleText">Gravata_LMSにログイン</h1>
  </div>

  <!-- ログイン -->
  <div id="loginView">
    <div class="err" id="loginErr"></div>
    <div class="ok" id="loginOk"></div>

    <form id="loginForm">
      <div class="field">
        <label for="email">メールアドレス</label>
        <input id="email" type="email" placeholder="name@company.jp" autocomplete="email" value="tanaka@sample.co.jp" />
      </div>
      <div class="field">
        <label for="password">パスワード</label>
        <input id="password" type="password" placeholder="パスワードを入力" autocomplete="current-password" value="demo1234" />
      </div>
      <div class="row">
        <label class="remember"><input type="checkbox" checked style="width:14px;height:14px;margin:0" /> ログイン状態を保持する</label>
        <a class="forgot" href="#">パスワードをお忘れですか</a>
      </div>
      <button type="submit" class="btn-primary" id="loginBtn">ログイン</button>
    </form>

    <div class="divider">または</div>
    <div class="switch-link" id="showSignup">初めての方はこちら（新規アカウント登録）</div>

    <div class="demo-note">※ デモ用アカウント：受講者 tanaka@sample.co.jp / demo1234</div>
    <div class="demo-note" style="margin-top:6px"><a href="admin-login.html" style="color:#1F3864;font-weight:700;text-decoration:none">企業管理者の方はこちら（管理者用ログイン）</a></div>
    <div class="demo-note" style="margin-top:6px"><a href="operator-login.html" style="color:#1F3864;font-weight:700;text-decoration:none">自社運用者の方はこちら（運用者用ログイン）</a></div>
  </div>

  <!-- 新規登録 -->
  <div id="signupView">
    <div class="err" id="signupErr"></div>

    <form id="signupForm">
      <div class="field">
        <label for="suName">氏名</label>
        <input id="suName" type="text" placeholder="山田 太郎" />
      </div>
      <div class="field">
        <label for="suCompany">会社名</label>
        <select id="suCompany">
          <option value="">読み込み中...</option>
        </select>
      </div>
      <div class="field">
        <label for="suEmail">メールアドレス</label>
        <input id="suEmail" type="email" placeholder="name@company.jp" />
      </div>
      <div class="field">
        <label for="suPassword">パスワード（8文字以上）</label>
        <input id="suPassword" type="password" placeholder="パスワードを入力" />
      </div>
      <div class="field">
        <label for="suPassword2">パスワード（確認）</label>
        <input id="suPassword2" type="password" placeholder="もう一度入力" />
      </div>
      <button type="submit" class="btn-primary" id="signupBtn">登録を申請する</button>
    </form>

    <div class="divider">または</div>
    <div class="switch-link" id="showLogin">ログイン画面に戻る</div>

    <div class="demo-note">※ 登録後、所属企業の企業管理者が承認するとログインできるようになります。</div>
  </div>

  <div class="footer-links">
    <a href="#">利用規約</a>・<a href="#">プライバシーポリシー</a>・<a href="#">お問い合わせ</a>
  </div>
</div>

<script>
var loginView = document.getElementById('loginView');
var signupView = document.getElementById('signupView');
var titleText = document.getElementById('titleText');

document.getElementById('showSignup').addEventListener('click', function () {
  loginView.style.display = 'none';
  signupView.style.display = 'block';
  titleText.textContent = '新規アカウント登録';
});

// ---- 会社名プルダウンの読み込み（運用者が登録済みの契約企業のみ選択可） ----
function loadCompanyOptions() {
  var select = document.getElementById('suCompany');
  sb.from('companies').select('*').order('name', { ascending: true }).then(function (res) {
    if (res.error || !res.data || !res.data.length) {
      select.innerHTML = '<option value="">登録可能な会社がありません</option>';
      return;
    }
    select.innerHTML = '<option value="">選択してください</option>' +
      res.data.map(function (c) { return '<option value="' + c.id + '">' + c.name + '</option>'; }).join('');
  });
}
loadCompanyOptions();
document.getElementById('showLogin').addEventListener('click', function () {
  signupView.style.display = 'none';
  loginView.style.display = 'block';
  titleText.textContent = 'Gravata_LMSにログイン';
});

// ---- ログイン処理 ----
document.getElementById('loginForm').addEventListener('submit', function (e) {
  e.preventDefault();
  var email = document.getElementById('email').value.trim();
  var pw = document.getElementById('password').value;
  var errBox = document.getElementById('loginErr');
  var okBox = document.getElementById('loginOk');
  errBox.style.display = 'none';
  okBox.style.display = 'none';

  if (!email || !pw) {
    errBox.textContent = 'メールアドレスとパスワードを入力してください。';
    errBox.style.display = 'block';
    return;
  }

  var btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = 'ログイン中...';

  sha256Hex(pw).then(function (hash) {
    return sb.from('app_users').select('*, companies(name)').eq('email', email).maybeSingle().then(function (res) {
      btn.disabled = false;
      btn.textContent = 'ログイン';

      if (res.error || !res.data) {
        errBox.textContent = 'メールアドレスまたはパスワードが正しくありません。';
        errBox.style.display = 'block';
        return;
      }
      var u = res.data;
      if (u.password_hash !== hash) {
        errBox.textContent = 'メールアドレスまたはパスワードが正しくありません。';
        errBox.style.display = 'block';
        return;
      }
      if (u.status === 'pending') {
        errBox.textContent = 'このアカウントはまだ企業管理者の承認待ちです。承認後にログインできます。';
        errBox.style.display = 'block';
        return;
      }
      if (u.status === 'suspended') {
        errBox.textContent = 'このアカウントは停止されています。管理者にお問い合わせください。';
        errBox.style.display = 'block';
        return;
      }
      if (u.status === 'rejected') {
        errBox.textContent = '登録は承認されませんでした。管理者にお問い合わせください。';
        errBox.style.display = 'block';
        return;
      }
      if (u.role === 'company_admin') {
        errBox.innerHTML = '企業管理者の方は<a href="admin-login.html" style="color:#a13d34;font-weight:700">管理者用ログイン画面</a>からログインしてください。';
        errBox.style.display = 'block';
        return;
      }
      if (u.role === 'operator') {
        errBox.innerHTML = '自社運用者の方は<a href="operator-login.html" style="color:#a13d34;font-weight:700">運用者用ログイン画面</a>からログインしてください。';
        errBox.style.display = 'block';
        return;
      }

      saveSession({
        id: u.id,
        email: u.email,
        name: u.name,
        role: u.role,
        company_id: u.company_id,
        company_name: u.companies ? u.companies.name : null
      });
      window.location.href = roleHomePage(u.role);
    });
  });
});

// ---- 新規登録処理 ----
document.getElementById('signupForm').addEventListener('submit', function (e) {
  e.preventDefault();
  var name = document.getElementById('suName').value.trim();
  var companyId = document.getElementById('suCompany').value;
  var email = document.getElementById('suEmail').value.trim();
  var pw = document.getElementById('suPassword').value;
  var pw2 = document.getElementById('suPassword2').value;
  var errBox = document.getElementById('signupErr');
  errBox.style.display = 'none';

  if (!name || !companyId || !email || !pw || !pw2) {
    errBox.textContent = 'すべての項目を入力してください（会社が選択できない場合は運用者にお問い合わせください）。';
    errBox.style.display = 'block';
    return;
  }
  if (pw.length < 8) {
    errBox.textContent = 'パスワードは8文字以上で設定してください。';
    errBox.style.display = 'block';
    return;
  }
  if (pw !== pw2) {
    errBox.textContent = 'パスワードが一致しません。';
    errBox.style.display = 'block';
    return;
  }

  var btn = document.getElementById('signupBtn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  sb.from('app_users').select('id').eq('email', email).maybeSingle().then(function (existing) {
    if (existing.data) {
      btn.disabled = false;
      btn.textContent = '登録を申請する';
      errBox.textContent = 'このメールアドレスは既に登録されています。';
      errBox.style.display = 'block';
      return;
    }

    sha256Hex(pw).then(function (hash) {
      sb.from('app_users').insert({
        email: email,
        password_hash: hash,
        name: name,
        company_id: companyId,
        role: 'learner',
        status: 'pending'
      }).then(function (res) {
        btn.disabled = false;
        btn.textContent = '登録を申請する';
        if (res.error) {
          errBox.textContent = '登録に失敗しました：' + res.error.message;
          errBox.style.display = 'block';
          return;
        }
        document.getElementById('signupForm').reset();
        loadCompanyOptions();
        signupView.style.display = 'none';
        loginView.style.display = 'block';
        titleText.textContent = 'Gravata_LMSにログイン';
        var okBox = document.getElementById('loginOk');
        okBox.textContent = '登録申請を受け付けました。企業管理者の承認後にログインできます。';
        okBox.style.display = 'block';
      });
    });
  });
});
</script>

</body>
</html>
