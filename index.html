<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>助成金対応LMS ログイン</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; }
body {
  font-family: "Yu Gothic", "Hiragino Sans", "Noto Sans JP", sans-serif;
  background: #eef1f6;
  color: #22252b;
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 16px;
}
.card {
  width: 100%;
  max-width: 420px;
  background: #fff;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 8px 30px rgba(20,30,60,0.10);
  border: 1px solid #e2e5ea;
  padding: 40px 36px 36px;
}
.brand { text-align: center; margin-bottom: 28px; }
.brand .mark {
  width: 46px; height: 46px; border-radius: 12px;
  background: #1F3864; color: #fff; font-weight: 700; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 14px;
}
.brand h1 { font-size: 18px; font-weight: 700; margin: 0 0 4px; color: #1F3864; }
.brand p { font-size: 12.5px; color: #767b85; margin: 0; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12.5px; color: #444; margin-bottom: 6px; font-weight: 500; }
.field input {
  width: 100%; height: 42px; border: 1px solid #d8dbe2; border-radius: 8px;
  padding: 0 12px; font-size: 14px; color: #22252b; background: #fafbfc;
  outline: none;
}
.field input:focus { border-color: #1F3864; background: #fff; }
.row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.remember { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: #555; }
.forgot { font-size: 12.5px; color: #1F3864; text-decoration: none; }
.forgot:hover { text-decoration: underline; }
.btn-primary {
  width: 100%; height: 44px; border: none; border-radius: 8px;
  background: #1F3864; color: #fff; font-size: 14.5px; font-weight: 700;
  cursor: pointer;
}
.btn-primary:hover { background: #16294d; }
.divider { display: flex; align-items: center; gap: 10px; margin: 22px 0; color: #b3b6bd; font-size: 11px; }
.divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #e6e8ec; }
.invite-note {
  background: #f4f6fb; border: 1px solid #e2e6ee; border-radius: 8px;
  padding: 12px 14px; font-size: 12px; color: #5c626e; text-align: center;
}
.footer-links { text-align: center; margin-top: 22px; font-size: 12px; color: #9296a0; }
.footer-links a { color: #767b85; text-decoration: none; margin: 0 6px; }
.err {
  display: none;
  background: #fdeceb; border: 1px solid #f3c6c2; color: #a13d34;
  font-size: 12.5px; border-radius: 8px; padding: 10px 12px; margin-bottom: 16px;
}
.demo-note {
  text-align: center; font-size: 11.5px; color: #9296a0; margin-top: 16px;
}
</style>
</head>
<body>

<div class="card">
  <div class="brand">
    <div class="mark">LMS</div>
    <h1>助成金対応LMSにログイン</h1>
    <p>人材開発支援助成金 リスキリング支援コース対応</p>
  </div>

  <div class="err" id="err">メールアドレスとパスワードを入力してください。</div>

  <form id="loginForm">
    <div class="field">
      <label for="email">メールアドレス</label>
      <input id="email" type="email" placeholder="name@company.jp" autocomplete="email" value="tanaka@sample.co.jp" />
    </div>
    <div class="field">
      <label for="password">パスワード</label>
      <input id="password" type="password" placeholder="パスワードを入力" autocomplete="current-password" value="demo1234" />
    </div>
    <div class="row">
      <label class="remember"><input type="checkbox" checked style="width:14px;height:14px;margin:0" /> ログイン状態を保持する</label>
      <a class="forgot" href="#">パスワードをお忘れですか</a>
    </div>
    <button type="submit" class="btn-primary">ログイン</button>
  </form>

  <div class="divider">または</div>
  <div class="invite-note">
    企業から届いた招待メールをお持ちの方は、メール内のリンクからアカウントを設定してください。
  </div>

  <div class="footer-links">
    <a href="#">利用規約</a>・<a href="#">プライバシーポリシー</a>・<a href="#">お問い合わせ</a>
  </div>
  <div class="demo-note">※ デザイン確認用デモです。上記のメール/パスワードは入力済みなのでそのままログインできます。</div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e){
  e.preventDefault();
  var email = document.getElementById('email').value;
  var pw = document.getElementById('password').value;
  var err = document.getElementById('err');
  if (!email || !pw) {
    err.style.display = 'block';
    return;
  }
  err.style.display = 'none';
  window.location.href = 'mypage.html';
});
</script>

</body>
</html>
