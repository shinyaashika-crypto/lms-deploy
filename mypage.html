<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>マイページ | 助成金対応LMS</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; }
body {
  font-family: "Yu Gothic", "Hiragino Sans", "Noto Sans JP", sans-serif;
  background: #eef1f6;
  color: #22252b;
  margin: 0;
}
header {
  background: #fff;
  border-bottom: 1px solid #e2e5ea;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
header .brand { display: flex; align-items: center; gap: 10px; }
header .mark {
  width: 32px; height: 32px; border-radius: 8px;
  background: #1F3864; color: #fff; font-weight: 700; font-size: 12px;
  display: flex; align-items: center; justify-content: center;
}
header .name { font-weight: 700; font-size: 15px; color: #1F3864; }
header .user { display: flex; align-items: center; gap: 10px; font-size: 13px; color: #555; }
header .avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: #DCE6F1; color: #1F3864; font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
header a.logout { font-size: 12.5px; color: #888; text-decoration: none; margin-left: 6px; }
.wrap { max-width: 860px; margin: 0 auto; padding: 32px 24px 80px; }
h1 { font-size: 20px; margin: 0 0 20px; color: #22252b; }
.stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-bottom: 28px; }
.stat { background: #fff; border: 1px solid #e2e5ea; border-radius: 10px; padding: 16px; }
.stat .label { font-size: 12px; color: #767b85; margin-bottom: 4px; }
.stat .value { font-size: 22px; font-weight: 700; color: #1F3864; }
.course-list { display: flex; flex-direction: column; gap: 10px; }
.course {
  background: #fff; border: 1px solid #e2e5ea; border-radius: 10px;
  padding: 14px 16px; display: flex; align-items: center; gap: 14px;
}
.course .icon {
  width: 38px; height: 38px; border-radius: 8px; background: #f2f5fa;
  display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
}
.course .info { flex: 1; min-width: 0; }
.course .title { font-size: 14.5px; font-weight: 700; margin-bottom: 3px; }
.course .meta { font-size: 12px; color: #767b85; }
.course.done { opacity: 0.75; }
.progress-bar { width: 100px; height: 6px; background: #eceff3; border-radius: 4px; overflow: hidden; margin-top: 6px; }
.progress-bar div { height: 100%; background: #1F3864; }
.btn { height: 32px; padding: 0 14px; font-size: 12.5px; border-radius: 8px; border: 1px solid #d8dbe2; background: #fff; color: #22252b; cursor: pointer; white-space: nowrap; }
.btn:hover { background: #f4f6fb; }
.btn-done { border-color: #bcd9c8; color: #1e7a4c; background: #f2faf5; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="mark">LMS</div>
    <div class="name">助成金対応LMS</div>
  </div>
  <div class="user">
    <a class="logout" href="admin.html">企業管理者画面(デモ)</a>
    <a class="logout" href="operator.html">自社運用者画面(デモ)</a>
    <div class="avatar">田中</div>
    <span>田中 一郎さん</span>
    <a class="logout" href="index.html">ログアウト</a>
  </div>
</header>

<div class="wrap">
  <h1>マイページ</h1>

  <div class="stats">
    <div class="stat"><div class="label">受講中</div><div class="value">2</div></div>
    <div class="stat"><div class="label">修了済み</div><div class="value">1</div></div>
    <div class="stat"><div class="label">今年度の受講回数</div><div class="value">3 / 3</div></div>
  </div>

  <div class="course-list">
    <div class="course">
      <div class="icon">📊</div>
      <div class="info">
        <div class="title">DX推進のためのデータ分析基礎</div>
        <div class="meta">標準学習時間 12時間 ・ 進捗 65%</div>
        <div class="progress-bar"><div style="width:65%"></div></div>
      </div>
      <a class="btn" href="course.html?course=data-analysis" style="text-decoration:none;display:inline-flex;align-items:center;justify-content:center">続きから</a>
    </div>
    <div class="course">
      <div class="icon">☁️</div>
      <div class="info">
        <div class="title">クラウドセキュリティ入門</div>
        <div class="meta">標準学習時間 10時間 ・ 進捗 20%</div>
        <div class="progress-bar"><div style="width:20%"></div></div>
      </div>
      <a class="btn" href="course.html?course=cloud-security" style="text-decoration:none;display:inline-flex;align-items:center;justify-content:center">続きから</a>
    </div>
    <div class="course done">
      <div class="icon">✅</div>
      <div class="info">
        <div class="title">生成AI活用の基礎</div>
        <div class="meta" style="color:#1e7a4c">修了済み ・ 2026/05/12</div>
      </div>
      <button class="btn btn-done">修了証をダウンロード</button>
    </div>
  </div>
</div>

</body>
</html>
