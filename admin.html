<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>企業管理者画面 | 助成金対応LMS</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; }
body {
  font-family: "Yu Gothic", "Hiragino Sans", "Noto Sans JP", sans-serif;
  background: #eef1f6;
  color: #22252b;
  margin: 0;
}
header {
  background: #fff;
  border-bottom: 1px solid #e2e5ea;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
header .brand { display: flex; align-items: center; gap: 10px; }
header .mark {
  width: 32px; height: 32px; border-radius: 8px;
  background: #1F3864; color: #fff; font-weight: 700; font-size: 12px;
  display: flex; align-items: center; justify-content: center;
}
header .name { font-weight: 700; font-size: 15px; color: #1F3864; }
header .role { font-size: 11.5px; background: #DCE6F1; color: #1F3864; padding: 3px 10px; border-radius: 6px; margin-left: 6px; }
header a.back { font-size: 12.5px; color: #767b85; text-decoration: none; }
header a.back:hover { text-decoration: underline; }
.layout { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 61px); }
nav.side { background: #fff; border-right: 1px solid #e2e5ea; padding: 20px 12px; }
nav.side .company { font-size: 12px; color: #767b85; padding: 0 10px 14px; }
nav.side button {
  display: block; width: 100%; text-align: left; background: none; border: none;
  padding: 10px 12px; border-radius: 8px; font-size: 13.5px; color: #444; cursor: pointer; margin-bottom: 2px;
}
nav.side button:hover { background: #f4f6fb; }
nav.side button.active { background: #1F3864; color: #fff; font-weight: 700; }
main { padding: 28px 32px; }
.panel { display: none; }
.panel.active { display: block; }
h1 { font-size: 18px; margin: 0 0 18px; }
.card { background: #fff; border: 1px solid #e2e5ea; border-radius: 12px; padding: 18px 20px; margin-bottom: 16px; }
.toolbar { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.toolbar input, .toolbar select {
  height: 34px; border: 1px solid #d8dbe2; border-radius: 8px; padding: 0 10px; font-size: 13px; background: #fafbfc;
}
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; color: #767b85; font-weight: 500; padding: 8px 10px; border-bottom: 1px solid #e2e5ea; }
td { padding: 10px; border-bottom: 1px solid #f0f1f4; }
.badge { font-size: 11.5px; padding: 3px 10px; border-radius: 6px; white-space: nowrap; }
.badge.progress { background: #DCE6F1; color: #1F3864; }
.badge.done { background: #e3f5e9; color: #1e7a4c; }
.badge.warn { background: #fdf2df; color: #8a6416; }
.btn { height: 34px; padding: 0 14px; font-size: 12.5px; border-radius: 8px; border: 1px solid #d8dbe2; background: #fff; color: #22252b; cursor: pointer; }
.btn:hover { background: #f4f6fb; }
.btn-primary { border: none; background: #1F3864; color: #fff; font-weight: 700; }
.btn-primary:hover { background: #16294d; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.field label { display: block; font-size: 12px; color: #555; margin-bottom: 6px; }
.field input, .field select { width: 100%; height: 36px; border: 1px solid #d8dbe2; border-radius: 8px; padding: 0 10px; font-size: 13px; background: #fafbfc; }
.preview { background: #f4f6fb; border: 1px solid #e2e6ee; border-radius: 8px; padding: 12px 14px; font-size: 13px; margin-bottom: 14px; }
.preview-row { display: flex; justify-content: space-between; padding: 4px 0; }
.preview-row span:last-child { color: #767b85; }
.tabs { display: flex; gap: 16px; border-bottom: 1px solid #e2e5ea; margin-bottom: 16px; }
.tabs div { font-size: 13px; padding-bottom: 8px; cursor: pointer; color: #767b85; }
.tabs div.active { color: #1F3864; font-weight: 700; border-bottom: 2px solid #1F3864; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<header>
  <div class="brand">
    <div class="mark">LMS</div>
    <div class="name">助成金対応LMS</div>
    <span class="role">企業管理者</span>
  </div>
  <a class="back" href="mypage.html">受講者画面へ</a>
</header>

<div class="layout">
  <nav class="side">
    <div class="company">株式会社サンプル</div>
    <button class="nav-btn active" data-panel="p1">受講者管理一覧</button>
    <button class="nav-btn" data-panel="p2">レポート出力</button>
    <button class="nav-btn" data-panel="p3">受講者の招待</button>
  </nav>

  <main>
    <div class="panel active" id="p1">
      <h1>受講者管理一覧</h1>
      <div class="card">
        <div class="toolbar">
          <input type="text" placeholder="氏名で検索" style="width:180px" />
          <select><option>すべての講座</option></select>
          <select><option>すべての状態</option></select>
        </div>
        <table>
          <tr><th>氏名</th><th>講座</th><th>進捗</th><th>状態</th></tr>
          <tr><td>田中 一郎</td><td>データ分析基礎</td><td>65%</td><td><span class="badge progress">受講中</span></td></tr>
          <tr><td>佐藤 花子</td><td>生成AI活用の基礎</td><td>100%</td><td><span class="badge done">修了</span></td></tr>
          <tr><td>鈴木 健太</td><td>クラウドセキュリティ入門</td><td>5%</td><td><span class="badge warn">未着手に近い</span></td></tr>
        </table>
      </div>
    </div>

    <div class="panel" id="p2">
      <h1>助成金エビデンスレポート出力</h1>
      <div class="card">
        <div class="toolbar" style="justify-content:space-between">
          <button class="btn" id="refreshLogsBtn">最新のログを取得</button>
          <button class="btn-primary btn" id="csvBtn">CSV出力</button>
        </div>
        <div id="logStatus" style="font-size:12.5px;color:#767b85;margin-bottom:10px">未取得です。「最新のログを取得」を押してください。</div>
        <table id="logTable" style="display:none">
          <tr><th>受講者名</th><th>会社名</th><th>受講コース</th><th>コンテンツ名</th><th>学習開始時間</th><th>学習終了時間</th><th>所要時間</th></tr>
        </table>
      </div>
    </div>

    <div class="panel" id="p3">
      <h1>受講者の招待・一括登録</h1>
      <div class="card">
        <div class="tabs">
          <div class="active">個別登録</div>
          <div>CSV一括登録</div>
        </div>
        <div class="grid2">
          <div class="field"><label>氏名</label><input type="text" placeholder="氏名" /></div>
          <div class="field"><label>メールアドレス</label><input type="text" placeholder="メールアドレス" /></div>
        </div>
        <div class="field" style="margin-bottom:14px"><label>割り当てる講座</label><select><option>データ分析基礎</option></select></div>
        <div style="display:flex;justify-content:flex-end">
          <button class="btn-primary btn" onclick="alert('デザイン確認用モックアップです')">招待メールを送信</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
document.querySelectorAll('.nav-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
    document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById(btn.dataset.panel).classList.add('active');
  });
});

var SUPABASE_URL = 'https://aljqmldikmnnprxucnva.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFsanFtbGRpa21ubnByeHVjbnZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0NjczMjgsImV4cCI6MjEwMDA0MzMyOH0.D5pB45t0QUE3hj0WtO8zxufVqKVVOfJhowHpbAUEJrE';
var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
var currentRows = [];

function fmtDate(iso) {
  var d = new Date(iso);
  return d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0') + ' ' +
    String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0') + ':' + String(d.getSeconds()).padStart(2,'0');
}

function fmtDuration(startIso, endIso) {
  if (!endIso) return '-';
  var sec = Math.round((new Date(endIso) - new Date(startIso)) / 1000);
  var m = Math.floor(sec / 60);
  var s = sec % 60;
  return (m > 0 ? m + '分' : '') + s + '秒';
}

function loadLogs() {
  var status = document.getElementById('logStatus');
  status.textContent = '取得中...';
  sb.from('session_logs').select('*').order('started_at', { ascending: false }).limit(200).then(function(res){
    if (res.error) {
      status.textContent = '取得に失敗しました: ' + res.error.message;
      return;
    }
    currentRows = res.data;
    var table = document.getElementById('logTable');
    table.style.display = currentRows.length ? 'table' : 'none';
    status.textContent = currentRows.length ? (currentRows.length + '件のログを取得しました。') : 'ログがまだありません。受講画面を開くと記録されます。';
    var rows = '<tr><th>受講者名</th><th>会社名</th><th>受講コース</th><th>コンテンツ名</th><th>学習開始時間</th><th>学習終了時間</th><th>所要時間</th></tr>';
    currentRows.forEach(function(r){
      var end = r.ended_at ? fmtDate(r.ended_at) : '<span class="badge progress">受講中</span>';
      var dur = fmtDuration(r.started_at, r.ended_at);
      rows += '<tr><td>' + r.learner_name + '</td><td>' + r.company_name + '</td><td>' + r.course_title + '</td><td>' + r.content_name + '</td><td>' + fmtDate(r.started_at) + '</td><td>' + end + '</td><td>' + dur + '</td></tr>';
    });
    table.innerHTML = rows;
  });
}

document.getElementById('refreshLogsBtn').addEventListener('click', loadLogs);

document.getElementById('csvBtn').addEventListener('click', function(){
  if (!currentRows.length) {
    alert('先に「最新のログを取得」を押してください。');
    return;
  }
  var header = ['受講者名','会社名','受講コース','コンテンツ名','学習開始時間','学習終了時間','所要時間'];
  var lines = [header.join(',')];
  currentRows.forEach(function(r){
    lines.push([r.learner_name, r.company_name, r.course_title, r.content_name, fmtDate(r.started_at), r.ended_at ? fmtDate(r.ended_at) : '受講中', fmtDuration(r.started_at, r.ended_at)].join(','));
  });
  var csv = '﻿' + lines.join('\r\n');
  var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = '受講ログ_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
});

loadLogs();
</script>

</body>
</html>
